name: PR Automation Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: |
          eslint_output=$(npm run lint 2>&1)
          echo "eslint_output<<EOF" >> $GITHUB_OUTPUT
          echo "$eslint_output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Prettier
        id: prettier
        run: |
          prettier_output=$(npx prettier --check . 2>&1)
          echo "prettier_output<<EOF" >> $GITHUB_OUTPUT
          echo "$prettier_output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Code Quality Report
        uses: actions/github-script@v7
        id: codeQualityComment
        with:
          script: |
            const { eslint_output, prettier_output } = context.payload.pull_request.head.sha === context.sha ? steps : context;
            const commentBody = `## Code Quality Report\n\n### ESLint Results\n\`\`\`\n${eslint_output}\n\`\`\`\n\n### Prettier Results\n\`\`\`\n${prettier_output}\n\`\`\``;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existingComment = comments.data.find(comment => comment.body.includes("Code Quality Report") && comment.user.login === "github-actions[bot]");
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Test Suite with Coverage
        id: test
        run: |
          npm test -- --coverage
          coverage_summary=$(cat coverage/coverage-summary.json)
          echo "coverage_summary<<EOF" >> $GITHUB_OUTPUT
          echo "$coverage_summary" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        id: testCoverageComment
        with:
          script: |
            const { coverage_summary } = context.payload.pull_request.head.sha === context.sha ? steps : context;
            const summary = JSON.parse(coverage_summary);
            const commentBody = `## Test Coverage Report\n\n| Metric | Value |\n|--------|-------|\n| Statements | ${summary.total.statements.pct}% |\n| Branches | ${summary.total.branches.pct}% |\n| Functions | ${summary.total.functions.pct}% |\n| Lines | ${summary.total.lines.pct}% |\n\nFull coverage report available as artifact.`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existingComment = comments.data.find(comment => comment.body.includes("Test Coverage Report") && comment.user.login === "github-actions[bot]");
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-report
          path: coverage/
          retention-days: 7

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for gitleaks to scan all history

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Dependency Vulnerability Check
        id: npm-audit
        run: |
          npm_audit_output=$(npm audit --json 2>&1)
          echo "npm_audit_output<<EOF" >> $GITHUB_OUTPUT
          echo "$npm_audit_output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Secret Scan
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: "--redact"
        continue-on-error: true  # Don't fail job on secrets found, just report

      - name: Post Security Scan Report
        uses: actions/github-script@v7
        id: securityScanComment
        with:
          script: |
            const { npm_audit_output } = context.payload.pull_request.head.sha === context.sha ? steps : context;
            const gitleaks_output = steps.gitleaks.outputs.scan;
            let auditSummary = "No vulnerabilities found.";
            try {
              const audit = JSON.parse(npm_audit_output);
              if (audit.metadata.vulnerabilities.total > 0) {
                auditSummary = `Found ${audit.metadata.vulnerabilities.total} vulnerabilities:\n- Critical: ${audit.metadata.vulnerabilities.critical}\n- High: ${audit.metadata.vulnerabilities.high}\n- Moderate: ${audit.metadata.vulnerabilities.moderate}\n- Low: ${audit.metadata.vulnerabilities.low}\n\nFull details in npm audit output.`;
              }
            } catch (e) {
              auditSummary = "Error parsing npm audit output:\n" + npm_audit_output;
            }
            const secretSummary = gitleaks_output ? `Secret scan found issues:\n\`\`\`\n${gitleaks_output}\n\`\`\`` : "No secrets found.";
            const commentBody = `## Security Scan Report\n\n### Dependencies\n${auditSummary}\n\n### Secrets\n${secretSummary}`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existingComment = comments.data.find(comment => comment.body.includes("Security Scan Report") && comment.user.login === "github-actions[bot]");
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Application
        id: build
        run: |
          build_output=$(npm run build 2>&1)
          echo "build_output<<EOF" >> $GITHUB_OUTPUT
          echo "$build_output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Install Wait-On for Endpoint Validation
        run: npm install -g wait-on

      - name: Start Server in Background
        run: npm start &

      - name: Wait for Server to Be Ready
        run: wait-on http://localhost:3000  # Adjust port if needed

      - name: Validate Endpoints
        id: endpoints
        run: |
          endpoint_output=$(curl -I http://localhost:3000 2>&1)
          echo "endpoint_output<<EOF" >> $GITHUB_OUTPUT
          echo "$endpoint_output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          # Add additional endpoint checks here if needed

      - name: Upload Deployment Preview Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-preview
          path: build/  # Adjust path if your build output is in a different directory
          retention-days: 7

      - name: Post Build Validation Status
        uses: actions/github-script@v7
        id: buildValidationComment
        with:
          script: |
            const { build_output, endpoint_output } = context.payload.pull_request.head.sha === context.sha ? steps : context;
            const commentBody = `## Build Validation\n\n### Build Status\n\`\`\`\n${build_output}\n\`\`\`\n\n### Endpoint Validation\n\`\`\`\n${endpoint_output}\n\`\`\`\n\nDeployment preview artifacts available.`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existingComment = comments.data.find(comment => comment.body.includes("Build Validation") && comment.user.login === "github-actions[bot]");
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }